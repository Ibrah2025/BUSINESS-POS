version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bizpos-postgres
    environment:
      POSTGRES_DB: business_pos
      POSTGRES_USER: bizpos
      POSTGRES_PASSWORD: bizpos_dev_2024
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizpos -d business_pos"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bizpos-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
